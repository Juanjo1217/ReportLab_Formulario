<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calibrador de Coordenadas PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #canvas-container { position: relative; cursor: crosshair; overflow: auto; background: #555; height: 80vh; }
        canvas { display: block; margin: 0 auto; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .marker { position: absolute; width: 8px; height: 8px; background: red; border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); }
    </style>
</head>
<body class="bg-gray-900 text-white p-6">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-2xl font-bold mb-4 text-teal-400">Calibrador Visual APS</h1>
        
        <div class="grid grid-cols-4 gap-6">
            <!-- Panel Lateral -->
            <div class="col-span-1 bg-gray-800 p-4 rounded-lg shadow-lg">
                <label class="block mb-2 font-bold">1. Carga captura de la página:</label>
                <input type="file" id="fileInput" class="block w-full text-sm mb-4">
                
                <label class="block mb-2 font-bold">2. Nombre del campo:</label>
                <input type="text" id="fieldName" placeholder="ej: departamento" class="w-full p-2 rounded bg-gray-700 mb-4 outline-none border border-teal-600">
                
                <div class="mt-4">
                    <h3 class="font-bold text-orange-400 mb-2">Diccionario Resultante:</h3>
                    <textarea id="output" class="w-full h-64 bg-black text-green-400 p-2 text-xs font-mono rounded" readonly></textarea>
                    <button onclick="copyToClipboard()" class="w-full mt-2 bg-teal-600 p-2 rounded font-bold uppercase text-sm">Copiar Diccionario</button>
                </div>
            </div>

            <!-- Área del Lienzo -->
            <div class="col-span-3">
                <p class="text-sm mb-2 text-gray-400 italic">Haz clic exactamente donde quieres que empiece el texto en el PDF original.</p>
                <div id="canvas-container">
                    <canvas id="pdfCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('pdfCanvas');
        const ctx = canvas.getContext('2d');
        const output = document.getElementById('output');
        const fieldInput = document.getElementById('fieldName');
        let img = new Image();

        // Constantes de PDF estándar (Letter)
        const PDF_WIDTH = 612;
        const PDF_HEIGHT = 792;

        document.getElementById('fileInput').onchange = function(e) {
            let reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        };

        canvas.addEventListener('mousedown', function(e) {
            const rect = canvas.getBoundingClientRect();
            const x_pixel = e.clientX - rect.left;
            const y_pixel = e.clientY - rect.top;

            // MATEMÁTICA DE CONVERSIÓN:
            // 1. Escalamos la posición del clic al tamaño de puntos del PDF (612x792)
            const pdf_x = Math.round((x_pixel / canvas.width) * PDF_WIDTH);
            
            // 2. Invertimos el eje Y (PDF empieza en 0 abajo, Navegador en 0 arriba)
            const pdf_y = Math.round(((canvas.height - y_pixel) / canvas.height) * PDF_HEIGHT);

            const name = fieldInput.value || "campo_sin_nombre";
            
            // Agregar al diccionario
            const entry = `"${name}": (${pdf_x}, ${pdf_y}),\n`;
            output.value += entry;

            // Dibujar punto visual
            ctx.fillStyle = "red";
            ctx.beginPath();
            ctx.arc(x_pixel, y_pixel, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Limpiar nombre para el siguiente
            fieldInput.value = "";
            fieldInput.focus();
        });

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert("¡Diccionario copiado!");
        }
    </script>
</body>
</html>
